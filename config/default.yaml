# =============================================================================
# Cardiac Optical Mapping Pipeline — Default Configuration
# =============================================================================
# All thresholds and parameters centralized here.
# Agents MUST NOT hardcode these values.

# --- Paths ---
results_root: "results"
data_root: "data"

# --- Calibration (from metadata_extractor, NOT used as silent fallback) ---
# NOTE: fps is ALWAYS read from .rsh/.gsh/.bvx via metadata_extractor.
# This field exists only for documentation; agents must raise if fps is missing.
# fps_default: 666.67  # DO NOT USE — metadata_extractor enforces extraction

# Pixel size: canonical value for MiCAM ULTIMA ×10 objective
pixel_size_mm: 0.085

# --- Loader ---
loader:
  crop_left: 20
  crop_right: 8
  bytes_per_pixel: 2

# --- Mask ---
mask:
  composite_threshold: 0.5
  min_area_fraction: 0.05
  contour_lpf_sigma: 2.0

# --- Preprocessing ---
preprocess:
  spatial_sigma: 2.0
  # Dual-stage LPF (v6): cutoff depends on target_stage passed to preprocess_video().
  # activation: 80 Hz  — suppress noise before upstroke (dV/dt) detection
  # apd:        150 Hz — preserve repolarization tail morphology
  lp_cutoff_activation_hz: 80.0
  lp_cutoff_apd_hz: 150.0
  chunk_size: 8192
  overlap: 256
  normalize_method: "percentile"
  normalize_q: 10.0
  # ASLS baseline correction (Eilers & Boelens 2005).
  # Applied AFTER inversion (p=0.01 expects peaks pointing up).
  asls_lam: 1.0e8    # Smoothness of estimated baseline (higher = smoother)
  asls_p: 0.01       # Asymmetry weight (0.01 = lower envelope)
  asls_niter: 3      # Number of ASLS iterations

# --- Activation ---
activation:
  methods:
    - "50pct"
    - "derivative_max"
    - "vectorized_interp"
  window_offset: 50            # frames before peak for analysis window
  retry_window_offset: 80      # larger window for retry on WARN
  min_peaks: 3                 # minimum peaks required
  tat_min_ms: 5.0
  tat_max_ms: 100.0
  beat_pass_rate_reject: 0.3

# --- APD ---
apd:
  levels: [30, 50, 80]
  apd_min_ms: 5.0
  apd_max_ms: 500.0
  poly_order: 5
  search_window_ms: 50.0

# --- Conduction Velocity ---
conduction:
  method: "filled_hybrid"
  coherence_threshold: 0.1
  integration_sigma: 4.0   # Gaussian sigma for Bayly method (pixels)
  cap: 5.0
  cv_min_m_per_s: 0.05     # Physiological lower bound (m/s = mm/ms)
  cv_max_m_per_s: 2.0      # Physiological upper bound (m/s = mm/ms)
  tolerance: 0.15          # Max relative difference between methods for consensus
  qc_threshold: 0.20       # Min valid tissue fraction for PASS (else REJECT)
  use_fallback: true

# --- Alternans ---
alternans:
  min_beats: 4
  ac_pct_thresholds: [5, 10, 20]
  f_dom_target: 0.5
  f_dom_tolerance: 0.1
  sign_floor_ms: 0.5
  discordant_threshold: 0.25

# --- Peak Detector ---
# v3.6 spec, 2026-07-09 — single-trace mode (legacy baseline, tag: v3.6-baseline)
# v3.7 spec, 2026-07-09 — multi-trace mode (3 regions, voting, soft assignment)
#
# Architecture: PeakDetectorAgent is a CONSUMER (Variant A).
#   - LoaderAgent owns preprocessing (inversion, LPF, normalization).
#   - PeakDetectorAgent aggregates 1D mean_tissue from preproc + mask
#     and calls detect_beats(mean_tissue, fps, stim_hz).
#   - ActivationAgent uses peaks as upstroke 50% crossings (NOT apex).
#   - APDAgent finds local argmax around each peak for amp/APD.
#
# v3.7 multi-trace:
#   - n_regions=3 traces from 3x3 mask_grid (top-3 by mean pixel_std)
#   - Consensus peaks: voted across regions (min_agreement >= 2 of 3)
#   - Soft assignment: Gaussian weights for per-pixel region influence
#   - Top-3 consensus beats selected by quality for downstream APD
peak_detector:
  # v3.6 (single-trace) — kept for back-compat, used when n_regions=1
  sigma_temporal: 3.0          # Gaussian LPF sigma in frames (static, NOT dynamic)
  threshold_frac: 0.5          # Rising edge at 50% of max amp (upstroke midpoint)
  min_distance_factor: 0.6     # Min distance between peaks = BCL * 0.6 (frames)
  drop_first: false            # Do NOT hardcode drop — QC owns startup artifact gate
  min_peaks: 3                 # Agent gating: raise if n_peaks < 3

  # v3.7 multi-trace mode
  n_regions: 3                 # 1 = legacy single-trace, 3 = multi-trace
  min_region_pixels: 50        # minimum pixels per region (else skip)
  min_agreement: 2             # ≥ N regions must agree on a peak
  frame_tolerance: 10          # ±10 frames = ±20ms @ 500fps grouping window
  soft_assignment_sigma: 20.0  # Gaussian sigma for pixel-to-region weights (pixels)
  min_quality: 0.66            # min fraction of regions agreeing (0.66 = 2/3)
  n_beats_select: 3            # top-N consensus beats selected for downstream APD

# --- QC / Judge ---
qc:
  peak_thr_frac_floor: 0.3
  min_beats_floor: 2
